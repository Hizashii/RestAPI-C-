<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubber Ducks API Client</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #333; }
    section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
    input, button { padding: 0.5rem; margin: 0.25rem; }
    button { cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
    button:hover { background: #106ebe; }
    button.danger { background: #d13438; }
    pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; font-size: 12px; }
    .error { color: #d13438; }
    .success { color: #107c10; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.5rem; border: 1px solid #ddd; text-align: left; }
  </style>
</head>
<body>
  <h1>Rubber Ducks API Client</h1>
  <p>API base: <input type="text" id="baseUrl" value="http://localhost:5043" style="width: 300px;"></p>

  <section>
    <h2>Authentication</h2>
    <div>
      <input type="text" id="username" placeholder="Username">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="register()">Register</button>
      <button onclick="login()">Login</button>
    </div>
    <p id="authStatus"></p>
  </section>

  <section>
    <h2>Rubber Ducks</h2>
    <div>
      <button onclick="getAll()">Get All</button>
      <button onclick="showCreateForm()">Create New</button>
    </div>
    <div id="createForm" style="display:none; margin-top: 1rem;">
      <input type="text" id="newName" placeholder="Name">
      <input type="text" id="newColor" placeholder="Color">
      <input type="text" id="newSize" placeholder="Size" value="Medium">
      <input type="number" id="newPrice" placeholder="Price" step="0.01">
      <input type="text" id="newDesc" placeholder="Description">
      <button onclick="create()">Create</button>
      <button onclick="document.getElementById('createForm').style.display='none'">Cancel</button>
    </div>
    <div id="ducksList"></div>
  </section>

  <section>
    <h2>Response</h2>
    <pre id="response"></pre>
  </section>

  <script>
    let token = localStorage.getItem('token') || '';

    async function api(path, options = {}) {
      const url = document.getElementById('baseUrl').value + path;
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(url, { ...options, headers });
      const text = await res.text();
      document.getElementById('response').textContent = text;
      try { return JSON.parse(text); } catch { return null; }
    }

    async function register() {
      const data = await api('/api/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      if (data?.token) {
        token = data.token;
        localStorage.setItem('token', token);
        document.getElementById('authStatus').innerHTML = '<span class="success">Registered & logged in!</span>';
      } else {
        document.getElementById('authStatus').innerHTML = '<span class="error">Registration failed</span>';
      }
    }

    async function login() {
      const data = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      if (data?.token) {
        token = data.token;
        localStorage.setItem('token', token);
        document.getElementById('authStatus').innerHTML = '<span class="success">Logged in!</span>';
      } else {
        document.getElementById('authStatus').innerHTML = '<span class="error">Login failed</span>';
      }
    }

    async function getAll() {
      const data = await api('/api/rubberducks');
      if (Array.isArray(data)) {
        const html = '<table><tr><th>ID</th><th>Name</th><th>Color</th><th>Size</th><th>Price</th><th>Actions</th></tr>' +
          data.map(d => `<tr><td>${d.id}</td><td>${d.name}</td><td>${d.color}</td><td>${d.size}</td><td>${d.price}</td>
            <td><button onclick="edit(${d.id})">Edit</button><button class="danger" onclick="del(${d.id})">Delete</button></td></tr>`).join('') + '</table>';
        document.getElementById('ducksList').innerHTML = html;
      }
    }

    function showCreateForm() {
      document.getElementById('createForm').style.display = 'block';
    }

    async function create() {
      await api('/api/rubberducks', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('newName').value,
          color: document.getElementById('newColor').value,
          size: document.getElementById('newSize').value || 'Medium',
          price: parseFloat(document.getElementById('newPrice').value) || 0,
          description: document.getElementById('newDesc').value || null
        })
      });
      document.getElementById('createForm').style.display = 'none';
      getAll();
    }

    async function del(id) {
      if (confirm('Delete this duck?')) {
        await api('/api/rubberducks/' + id, { method: 'DELETE' });
        getAll();
      }
    }

    function edit(id) {
      alert('Edit via Swagger or API client for full update support.');
    }
  </script>
</body>
</html>
