<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubber Ducks API Client</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #333; }
    section { margin: 2rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
    input, button { padding: 0.5rem; margin: 0.25rem; }
    button { cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
    button:hover { background: #106ebe; }
    button.danger { background: #d13438; }
    pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; font-size: 12px; }
    .error { color: #d13438; }
    .success { color: #107c10; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.5rem; border: 1px solid #ddd; text-align: left; }
  </style>
</head>
<body>
  <h1>Rubber Ducks API Client</h1>
  <p>API base: <input type="text" id="baseUrl" value="" style="width: 300px;"></p>
  <script>document.getElementById('baseUrl').value = window.location.origin;</script>

  <section>
    <h2>Authentication</h2>
    <div>
      <input type="text" id="username" placeholder="Username">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="register()">Register</button>
      <button onclick="login()">Login</button>
    </div>
    <p id="authStatus"></p>
  </section>

  <section>
    <h2>Rubber Ducks</h2>
    <div>
      <button onclick="getAll()">Get All</button>
      <button onclick="showCreateForm()">Create New</button>
    </div>
    <div id="createForm" style="display:none; margin-top: 1rem;">
      <input type="text" id="newName" placeholder="Name">
      <input type="text" id="newColor" placeholder="Color">
      <input type="text" id="newSize" placeholder="Size" value="Medium">
      <input type="number" id="newPrice" placeholder="Price" step="0.01">
      <input type="text" id="newDesc" placeholder="Description">
      <button onclick="create()">Create</button>
      <button onclick="document.getElementById('createForm').style.display='none'">Cancel</button>
    </div>
    <div id="ducksList"></div>
  </section>

  <section>
    <h2>Response</h2>
    <pre id="response"></pre>
  </section>

  <script>
    let token = localStorage.getItem('token') || '';
    updateAuthUI();

    function updateAuthUI() {
      const el = document.getElementById('authStatus');
      if (token) {
        el.innerHTML = '<span class="success">Authenticated (token stored)</span>';
      } else {
        el.innerHTML = 'Not logged in';
      }
    }

    function showResponse(status, body) {
      const el = document.getElementById('response');
      const prefix = status ? `[${status}] ` : '';
      try {
        el.textContent = prefix + JSON.stringify(JSON.parse(body), null, 2);
      } catch {
        el.textContent = prefix + body;
      }
    }

    function extractError(data, fallback) {
      if (!data) return fallback;
      if (data.message) return data.message;
      if (data.title) return data.title;
      if (data.errors) {
        const msgs = Object.entries(data.errors)
          .map(([field, errs]) => `${field}: ${[].concat(errs).join(', ')}`)
          .join('; ');
        return msgs || fallback;
      }
      return fallback;
    }

    async function api(path, options = {}) {
      const base = document.getElementById('baseUrl').value.replace(/\/+$/, '');
      const url = base + path;
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      try {
        const res = await fetch(url, { ...options, headers });
        const text = await res.text();
        showResponse(res.status, text);
        let data = null;
        try { data = JSON.parse(text); } catch {}
        return { ok: res.ok, status: res.status, data };
      } catch (err) {
        showResponse('ERR', err.message);
        return { ok: false, status: 0, data: null, error: err.message };
      }
    }

    async function register() {
      const { ok, data } = await api('/api/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const el = document.getElementById('authStatus');
      if (ok && data?.token) {
        token = data.token;
        localStorage.setItem('token', token);
        el.innerHTML = '<span class="success">Registered & logged in!</span>';
      } else {
        el.innerHTML = '<span class="error">' + extractError(data, 'Registration failed') + '</span>';
      }
    }

    async function login() {
      const { ok, data } = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const el = document.getElementById('authStatus');
      if (ok && data?.token) {
        token = data.token;
        localStorage.setItem('token', token);
        el.innerHTML = '<span class="success">Logged in!</span>';
      } else {
        el.innerHTML = '<span class="error">' + extractError(data, 'Login failed') + '</span>';
      }
    }

    async function getAll() {
      const { ok, data } = await api('/api/rubberducks');
      const el = document.getElementById('ducksList');
      if (ok && Array.isArray(data)) {
        if (data.length === 0) {
          el.innerHTML = '<p>No ducks yet. Create one!</p>';
          return;
        }
        el.innerHTML = '<table><tr><th>ID</th><th>Name</th><th>Color</th><th>Size</th><th>Price</th><th>Actions</th></tr>' +
          data.map(d => `<tr><td>${d.id}</td><td>${d.name}</td><td>${d.color}</td><td>${d.size}</td><td>${d.price}</td>
            <td><button onclick="edit(${d.id})">Edit</button> <button class="danger" onclick="del(${d.id})">Delete</button></td></tr>`).join('') + '</table>';
      } else {
        el.innerHTML = '<p class="error">' + extractError(data, 'Failed to load ducks (are you logged in?)') + '</p>';
      }
    }

    function showCreateForm() {
      document.getElementById('createForm').style.display = 'block';
    }

    async function create() {
      const { ok } = await api('/api/rubberducks', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('newName').value,
          color: document.getElementById('newColor').value,
          size: document.getElementById('newSize').value || 'Medium',
          price: parseFloat(document.getElementById('newPrice').value) || 0,
          description: document.getElementById('newDesc').value || null
        })
      });
      if (ok) {
        document.getElementById('createForm').style.display = 'none';
        getAll();
      }
    }

    async function del(id) {
      if (confirm('Delete this duck?')) {
        const { ok } = await api('/api/rubberducks/' + id, { method: 'DELETE' });
        if (ok) getAll();
      }
    }

    function edit(id) {
      alert('Edit via Swagger or API client for full update support.');
    }
  </script>
</body>
</html>
